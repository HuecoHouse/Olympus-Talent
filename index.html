<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Olympus Talent & Entertainment</title>

<meta name="description" content="Olympus Talent & Entertainment represents elite creators, athletes, and performers.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{
--gold:#ceb17e;
--gold-light:#dcc49a;
--black:#0c0c0c;
--gray:#9a9a9a;
--white:#f5f5f5;
}

body{
font-family:'Montserrat',sans-serif;
background:#0c0c0c;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
position:relative;
}

/* INTRO CINEMATIC FADE */

.intro{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
animation:introFade 3.5s forwards;
}

.intro h1{
font-family:'Cormorant Garamond',serif;
letter-spacing:.2em;
font-size:2rem;
color:#ceb17e;
opacity:0;
animation:introText 2s ease forwards;
}

@keyframes introFade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

@keyframes introText{
0%{opacity:0;letter-spacing:.5em}
100%{opacity:1;letter-spacing:.2em}
}

/* COLUMN BACKGROUND */

.columns{
position:fixed;
inset:0;
display:flex;
justify-content:space-around;
opacity:.06;
z-index:0;
}

.column{
width:120px;
background:linear-gradient(
to bottom,
transparent,
rgba(206,177,126,.4),
transparent
);
animation:columnMove 10s ease-in-out infinite;
}

.column:nth-child(2){animation-delay:2s}
.column:nth-child(3){animation-delay:4s}

@keyframes columnMove{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* PARTICLES */

canvas{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}

/* MAIN CONTENT */

.container{
max-width:560px;
padding:2rem;
position:relative;
z-index:2;
}

.logo{
width:280px;
margin-bottom:2rem;
filter:drop-shadow(0 0 10px rgba(206,177,126,.25));
}

.divider{
width:50px;
height:1px;
background:#ceb17e;
margin:2rem auto;
opacity:.6;
}

h1{
font-family:'Cormorant Garamond',serif;
font-weight:300;
letter-spacing:.08em;
font-size:clamp(2rem,5vw,3rem);
margin-bottom:1rem;
}

.sub{
color:#9a9a9a;
font-size:.85rem;
line-height:1.9;
margin-bottom:2rem;
}

/* FORM */

form{
display:flex;
}

input{
flex:1;
padding:1rem;
background:#161616;
border:1px solid rgba(206,177,126,.4);
border-right:none;
color:white;
}

button{
background:#ceb17e;
border:none;
padding:1rem 1.6rem;
font-size:.65rem;
letter-spacing:.2em;
text-transform:uppercase;
cursor:pointer;
}

button:hover{
background:#dcc49a;
}

/* CONTACT */

.contact{
margin-top:3rem;
font-size:.8rem;
color:#9a9a9a;
}

.contact a{
color:#9a9a9a;
text-decoration:none;
}

.contact a:hover{
color:white;
}

/* FOOTER */

footer{
position:fixed;
bottom:1rem;
text-align:center;
font-size:.6rem;
letter-spacing:.2em;
opacity:.4;
}

.footer-credit{
display:block;
margin-top:.6rem;
font-size:.55rem;
letter-spacing:.18em;
color:#ceb17e;
text-decoration:none;
}

.footer-credit:hover{
color:#dcc49a;
}

</style>

</head>

<body>

<div class="intro">
<h1>OLYMPUS</h1>
</div>

<div class="columns">
<div class="column"></div>
<div class="column"></div>
<div class="column"></div>
</div>

<canvas id="particles"></canvas>

<div class="container">

<img class="logo"
src="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/69a7b00ac3a5d76378be7804/f17893ea6_LogoT14x.png">

<div class="divider"></div>

<h1>Coming Soon</h1>

<p class="sub">
Olympus Talent & Entertainment is preparing something exceptional.
Join the list to be first to know when we launch.
</p>

<form action="https://formspree.io/f/xlgwqnlp" method="POST">

<input type="email" name="email" placeholder="Your email address" required>

<button type="submit">Notify</button>

<input type="text" name="_gotcha" style="display:none">

</form>

<div class="contact">

<p>Email</p>
<a href="mailto:contact@olympustalent.us">contact@olympustalent.us</a>

<br><br>

<p>Phone</p>
<a href="tel:7146734033">714-673-4033</a>

</div>

</div>

<footer>
© 2025 OLYMPUS TALENT & ENTERTAINMENT

<a class="footer-credit" href="https://huecohouse.com" target="_blank">
Website issued by Hueco House
</a>

</footer>

<script>

/* GOLD PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<90;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
speed:Math.random()*0.5
})
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="rgba(206,177,126,0.6)"

particles.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()
})

update()
}

function update(){
particles.forEach(p=>{
p.y+=p.speed
if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}
})
}

setInterval(draw,30)

</script>

</body>
</html>
